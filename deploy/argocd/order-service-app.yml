apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd

  annotations:
    # 🔥 Image updater config
    argocd-image-updater.argoproj.io/image-list: order-service=karthiq18/order-service
    argocd-image-updater.argoproj.io/order-service.update-strategy: latest

    # 🔥 Git write-back
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-credentials: secret:argocd/git-creds

spec:
  project: default

  source:
    repoURL: https://github.com/KartheekMarabathula/Multi-service-project.git
    targetRevision: main
    path: deploy/order-service

  destination:
    server: https://kubernetes.default.svc
    namespace: multi-service

  syncPolicy:
    automated:
      prune: true
      selfHeal: true